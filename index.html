<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tra cứu thông tin</title>

  <!-- Không cho search engine index -->
  <meta name="robots" content="noindex, noarchive" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: #fff;
    }

    header {
      height: 40px;
      padding: 8px 16px;
      background: #1f6fff;
      color: #fff;
      font-size: 15px;
      display: flex;
      align-items: center;
    }

    .wrap {
      position: relative;
      height: calc(100% - 40px);
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    /* ===== LỚP CHE NÚT STREAMLIT ===== */
    .shield {
      position: absolute;
      z-index: 10;
      pointer-events: auto;
      background: transparent;
    }


    .shield.pc {
      top: 0;
      right: 0;
      width: 260px;
      height: 80px;
    }
 
  
    .shield.mobile {
      left: 0;
      bottom: 0;
      width: 96px;
      height: 96px;
    }

    @media (max-width: 600px) {
      .shield.pc {
        width: 220px;
        height: 72px;
      }

      .shield.mobile {
        width: 72px;
        height: 72px;
      }
    }
  </style>
</head>

<body>
  <header>Tra cứu thông tin cá nhân</header>

  <div class="wrap">
    <!-- STREAMLIT APP -->
    <iframe id="app" allow="clipboard-read; clipboard-write"
            referrerpolicy="no-referrer"></iframe>

    <!-- PC -->
    <div class="shield pc" aria-hidden="true"></div>

    <!-- MOBILE -->
    <div class="shield mobile" aria-hidden="true"></div>
  </div>

  <script>
    (function () {
      // LINK APP Ở ĐÂY
      const STREAMLIT_URL = "https://cbkhtn.streamlit.app/?embed=true";

      const qs = window.location.search;
      const finalUrl = qs && qs.length > 1
        ? STREAMLIT_URL + "&" + qs.substring(1)
        : STREAMLIT_URL;
