<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tra cứu thông tin</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    header {
      height: 44px;
      background: #1f6fff;
      color: #fff;
      display: flex;
      align-items: center;
      padding-left: 12px;
      font-size: 15px;
    }
    iframe {
      width: 100%;
      height: calc(100% - 44px);
      border: none;
    }
  </style>
</head>

<body>
  <header>Tra cứu thông tin cá nhân</header>

  <iframe
    src="https://cbkhtn.streamlit.app/?embed=true&embed_options=show_toolbar=false"
    allow="clipboard-read; clipboard-write"
    referrerpolicy="no-referrer">
  </iframe>
</body>
</html>
