<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tra cứu thông tin</title>

  <meta name="robots" content="noindex, noarchive" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #fff;
    }

    header {
      height: 44px;
      background: #1f6fff;
      color: #fff;
      display: flex;
      align-items: center;
      padding-left: 12px;
      font-size: 15px;
    }

    .wrap {
      position: relative;
      height: calc(100% - 44px);
      overflow: hidden;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .bottom-shield {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 120px;
      background: transparent;
      z-index: 20;
      pointer-events: auto;
    }

    @media (max-width: 600px) {
      .bottom-shield {
        height: 150px;
      }
    }
  </style>
</head>

<body>
  <header>Tra cứu thông tin cá nhân</header>

  <div class="wrap">
    <iframe
      src="https://cbkhtn.streamlit.app/?embed=true&amp;embed_options=show_toolbar=false"
      allow="clipboard-read; clipboard-write"
      referrerpolicy="no-referrer">
    </iframe>

    <div class="bottom-shield" aria-hidden="true"></div>
  </div>
</body>
</html>
