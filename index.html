<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tra cứu thông tin</title>

  <meta name="robots" content="noindex, noarchive" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #fff;
    }

    /* Header */
    header {
      height: 44px;
      background: #1f6fff;
      color: #fff;
      display: flex;
      align-items: center;
      padding-left: 12px;
      font-size: 15px;
    }

    /* Wrapper */
    .wrap {
      position: relative;
      height: calc(100% - 44px);
      overflow: hidden;
    }

    /* Streamlit iframe */
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ===== CHE THANH DƯỚI STREAMLIT ===== */
    .bottom-shield {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 90px;               /* che đúng vùng có Built with Streamlit + Fullscreen */
      background: transparent;    /* trong suốt */
      z-index: 10;
      pointer-events: auto;       /* ăn click/touch */
    }

    /* Mobile: thanh Streamlit cao hơn một chút */
    @media (max-width: 600px) {
      .bottom-shield {
        height: 110px;
      }
    }
  </style>
</head>

<body>
  <header>Tra cứu thông tin cá nhân</header>

  <div class="wrap">
    <!-- STREAMLIT APP -->
    <iframe
      src="https://cbkhtn.streamlit.app/?embed=true&embed_options=show_toolbar=false"
      allow="clipboard-read; clipboard-write"
      referrerpolicy="no-referrer">
    </iframe>

    <!-- LỚP CHE VÙNG NÚT BÊN DƯỚI -->
    <div class="bottom-shield" aria-hidden="true"></div>
  </div>

</body>
</html>
